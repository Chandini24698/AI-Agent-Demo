<!DOCTYPE html>
<html>
<head>
    <title>Eternity Support Request</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        form { background: #f0f0f0; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Eternity Support Request</h1>
    <form>
        <label>Your Name:</label>
        <input type="text" name="name" required>
        
        <label>Your Email:</label>
        <input type="email" name="email" required>
        
        <label>Your Message:</label>
        <textarea name="message" rows="5" required></textarea>
        
        <label>Request Type:</label>
        <select name="type">
            <option>Question (opening hours, prices, etc)</option>
            <option>Action (cancel class, rebook, etc)</option>
            <option>Other</option>
        </select>
        
        <button type="submit">Send Request</button>
    </form>
</body>
</html>
